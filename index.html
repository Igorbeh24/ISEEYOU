    <title>Erro 404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #8B0000;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;

            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;

        /* Efeito de ruído/static */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.05;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        #message {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 
                0 0 10px #8B0000,
                0 0 20px #8B0000,
                0 0 40px #8B0000,
                0 0 80px #ff0000;
            animation: flicker 3s infinite;
            z-index: 10;
            letter-spacing: 10px;
        }
        
        .subtext {
            margin-top: 20px;
            font-size: 1rem;
            color: #444;
            animation: pulse 4s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            5% { opacity: 0.3; }
            10% { opacity: 1; }
            15% { opacity: 0.2; }
            20% { opacity: 1; }
            50% { opacity: 0.9; }
            52% { opacity: 0.3; }
            54% { opacity: 0.9; }
            90% { opacity: 1; }
            95% { opacity: 0.5; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
